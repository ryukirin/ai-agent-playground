openapi: 3.1.0
info:
  title: Spec-Kit Command Workflow API
  version: 0.2.0
  description: API contract for the orchestrated multi-agent, command-by-command workflow platform.
servers:
  - url: http://localhost:8000
paths:
  /api/commands:
    get:
      summary: List supported commands and their availability
      operationId: listCommands
      responses:
        '200':
          description: Command availability list
          content:
            application/json:
              schema:
                type: object
                properties:
                  commands:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommandAvailability'
                required: [commands]
  /api/runs:
    post:
      summary: Create a workflow run
      operationId: createWorkflowRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '201':
          description: Workflow run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunSummary'
  /api/runs/{runId}:
    get:
      summary: Get workflow run details
      operationId: getWorkflowRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Workflow run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunDetail'
        '404':
          description: Run not found
  /api/runs/{runId}/commands:
    post:
      summary: Execute one explicit workflow command
      operationId: executeCommand
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandExecutionRequest'
      responses:
        '202':
          description: Command accepted for execution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecutionSummary'
        '409':
          description: Command blocked by missing prerequisites or review state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedCommandResponse'
  /api/runs/{runId}/commands/{commandExecutionId}/rerun:
    post:
      summary: Rerun the same command after user edits
      operationId: rerunCommand
      parameters:
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/CommandExecutionId'
      responses:
        '202':
          description: Rerun accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandExecutionSummary'
  /api/runs/{runId}/artifacts:
    get:
      summary: List current artifacts for a workflow run
      operationId: listArtifacts
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Artifact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArtifactSummary'
                required: [artifacts]
components:
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommandExecutionId:
      name: commandExecutionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CommandAvailability:
      type: object
      properties:
        command:
          type: string
          enum: [specify, clarify, plan, tasks, implement, analyze]
        enabled:
          type: boolean
        reason:
          type: string
          nullable: true
        missingPrerequisites:
          type: array
          items:
            type: string
      required: [command, enabled, missingPrerequisites]
    CreateRunRequest:
      type: object
      properties:
        title:
          type: string
        workspacePath:
          type: string
          description: Canonical absolute local path under a server-configured allowlist of workspace roots.
        featureInput:
          type: string
      required: [title, workspacePath, featureInput]
    WorkflowRunSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [draft, active, blocked, completed, abandoned]
        currentCommand:
          type: string
          nullable: true
        currentCommandExecutionId:
          type: string
          format: uuid
          nullable: true
      required: [id, title, status]
    WorkflowRunDetail:
      allOf:
        - $ref: '#/components/schemas/WorkflowRunSummary'
        - type: object
          properties:
            commands:
              type: array
              items:
                $ref: '#/components/schemas/CommandExecutionSummary'
            latestArtifacts:
              type: array
              items:
                $ref: '#/components/schemas/ArtifactSummary'
            timelineFieldSet:
              type: array
              items:
                type: string
              description: Canonical field set exposed for each command-history item in timeline and audit views.
    CommandExecutionRequest:
      type: object
      properties:
        command:
          type: string
          enum: [specify, clarify, plan, tasks, implement, analyze]
      required: [command]
    CommandExecutionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        command:
          type: string
          enum: [specify, clarify, plan, tasks, implement, analyze]
        status:
          type: string
          enum: [queued, running, review_required, blocked, incomplete, completed, failed]
        artifactWriteStatus:
          type: string
          enum: [not_started, writing, succeeded, partial, failed]
        failureCategory:
          type: string
          enum: [none, prerequisite_block, review_block, agent_error, write_failure, model_unavailable, database_unavailable]
          nullable: true
        reviewStatus:
          type: string
          enum: [not_required, pending, approved, revised, blocked]
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        rerunOfCommandExecutionId:
          type: string
          format: uuid
          nullable: true
        recoveryAction:
          type: string
          enum: [none, manual_edit_then_rerun, retry_write_finalization]
          nullable: true
        handoffStatus:
          type: string
          enum: [not_started, in_progress, completed, blocked, failed]
          nullable: true
        missingPrerequisites:
          type: array
          items:
            type: string
        prerequisiteSnapshot:
          type: object
          additionalProperties: true
          nullable: true
        participatingAgents:
          type: array
          items:
            $ref: '#/components/schemas/AgentParticipationSummary'
      required: [id, command, status, artifactWriteStatus, participatingAgents]
    BlockedCommandResponse:
      type: object
      properties:
        command:
          type: string
        status:
          type: string
          enum: [blocked]
        reason:
          type: string
        missingPrerequisites:
          type: array
          items:
            type: string
        prerequisiteSnapshot:
          type: object
          additionalProperties: true
      required: [command, status, reason, missingPrerequisites, prerequisiteSnapshot]
    ArtifactSummary:
      type: object
      properties:
        artifactType:
          type: string
        relativePath:
          type: string
        version:
          type: integer
        status:
          type: string
          enum: [draft, approved, blocked, superseded, write_failed]
        sourceOfTruth:
          type: string
          enum: [database, local_file]
        lastWriteError:
          type: string
          nullable: true
      required: [artifactType, relativePath, version, status, sourceOfTruth]
    AgentParticipationSummary:
      type: object
      properties:
        agentName:
          type: string
        roleType:
          type: string
          enum: [orchestrator, stage, review]
        modelSlug:
          type: string
        usedFallback:
          type: boolean
        stageName:
          type: string
          nullable: true
      required: [agentName, roleType, modelSlug, usedFallback]

